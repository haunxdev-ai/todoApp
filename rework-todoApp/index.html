<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <header class="header">
      <div class="header-content">
        <div class="logo">
          <div class="logo-icon"></div>
          <span class="logo-text">Manager Task</span>
        </div>

        <h1 class="header-title">Todo List</h1>

        <div class="header-actions">
          <button class="notification-btn">
            <i class="fa-solid fa-bell fa-icon"></i>
          </button>
          <div class="profile-avatar">
            <i class="fa-solid fa-user fa-icon"></i>
          </div>
        </div>
      </div>
    </header>

    <main class="main-content">
      <div class="controls">
        <div class="search-container">
          <i class="fa-solid fa-magnifying-glass fa-icon search-icon"></i>
          <input type="text" class="search-input" placeholder="Search Task" />
        </div>

        <button class="add-btn">
          <i class="fa-solid fa-plus fa-icon"></i>
          Add Task
        </button>
      </div>

      <div class="tabs">
        <div class="tab-list">
          <button class="tab-button active all-tab" data-tab="all">
            All Task
          </button>
          <button class="tab-button" data-tab="active">Active</button>
          <button class="tab-button complete-btn" data-tab="completed">
            Completed
          </button>
        </div>
      </div>

      <div class="task-grid" id="todoList"></div>
    </main>

    <div class="modal-overlay" id="addTaskModal">
      <div class="modal">
        <div class="modal-header">
          <h2 class="modal-title">Add New Task</h2>
          <button class="modal-close">
            <i class="fa-solid fa-xmark fa-icon"></i>
          </button>
        </div>
        <div class="modal-body">
          <form class="todo-app-form">
            <div class="form-group">
              <label class="form-label" for="taskTitle">Task Title *</label>
              <input
                type="text"
                id="taskTitle"
                class="form-input"
                name="title"
                placeholder="Enter task title"
                required
              />
            </div>

            <div class="form-group">
              <label class="form-label" for="taskDescription"
                >Description</label
              >
              <textarea
                id="taskDescription"
                class="form-textarea"
                name="description"
                placeholder="Enter task description"
              ></textarea>
            </div>

            <div class="form-group">
              <label class="form-label" for="taskCategory">Category</label>
              <select id="taskCategory" class="form-select" name="category">
                <option value="">Select category</option>
                <option value="meeting">Meeting</option>
                <option value="design">Design</option>
                <option value="development">Development</option>
                <option value="planning">Planning</option>
                <option value="client">Client Work</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label" for="taskPriority">Priority</label>
              <select id="taskPriority" class="form-select" name="priority">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
                <option value="urgent">Urgent</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label">Time Schedule</label>
              <div class="time-inputs">
                <div>
                  <label class="form-label" for="startTime">Start Time</label>
                  <input
                    type="time"
                    id="startTime"
                    class="form-input"
                    name="starttime"
                  />
                </div>
                <div>
                  <label class="form-label" for="endTime">End Time</label>
                  <input
                    type="time"
                    id="endTime"
                    class="form-input"
                    name="endtime"
                  />
                </div>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="taskDate">Due Date</label>
              <input
                type="date"
                id="taskDate"
                class="form-input"
                name="duedate"
              />
            </div>

            <div class="form-group">
              <label class="form-label" for="taskColor">Card Color</label>
              <select id="taskColor" class="form-select" name="color">
                <option value="blue">Blue</option>
                <option value="purple">Purple</option>
                <option value="yellow">Yellow</option>
                <option value="pink">Pink</option>
                <option value="green">Green</option>
              </select>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-cancel btn-secondary">
                Cancel
              </button>
              <button type="submit" class="btn btn-primary submit-btn">
                Create Task
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div id="toast"></div>
    <script src="main.js"></script>
  </body>
</html>
